<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>外務員一種 ○×クイズ</title>
<style>
/* =============================================
   DESIGN: Obsidian dark × electric lime
   Signature: answer buttons as full-width
   tactile slabs — take up 50% of screen
============================================= */
:root {
  --bg:       #0A0A0F;
  --surface:  #141419;
  --surface2: #1E1E26;
  --border:   #2A2A38;
  --lime:     #C8F135;
  --lime-dim: #A8D020;
  --white:    #F0F0F5;
  --muted:    #6B6B80;
  --correct:  #4ADE80;
  --wrong:    #F87171;
  --amber:    #FBBF24;
  --text:     #F0F0F5;

  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 24px;
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ---- AUTH BAR ---- */
#authBar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  font-size: 0.75em;
  gap: 8px;
  position: sticky; top: 0; z-index: 100;
}
#authBar.hidden { display: none !important; }
.auth-user { display: flex; align-items: center; gap: 8px; min-width: 0; }
.auth-avatar { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; }
#authName { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.auth-btn {
  background: transparent;
  color: var(--lime);
  border: 1px solid var(--lime);
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 0.85em;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}

/* ---- HEADER ---- */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 37px;
  background: var(--bg);
  z-index: 99;
}
.app-title {
  font-size: 0.95em;
  font-weight: 800;
  letter-spacing: -0.02em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--white);
}
.app-title span { color: var(--lime); }
.header-stats { font-size: 0.75em; color: var(--muted); font-variant-numeric: tabular-nums; }
.skip-badge {
  background: var(--amber);
  color: #000;
  border-radius: 10px;
  padding: 1px 7px;
  font-weight: 700;
  font-size: 0.9em;
}

/* ---- LANG BAR ---- */
.lang-bar {
  display: flex;
  padding: 10px 16px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 93px;
  z-index: 98;
  overflow-x: auto;
  scrollbar-width: none;
}
.lang-bar::-webkit-scrollbar { display: none; }
.lang-btn {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 0.78em;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.lang-btn.active {
  background: var(--lime);
  color: #000;
  border-color: var(--lime);
  font-weight: 700;
}

/* =============================================
   START SCREEN
============================================= */
#startScreen {
  padding: 20px 18px 24px;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.start-eyebrow {
  font-size: 0.7em;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--lime);
}
.start-title {
  font-size: 1.7em;
  font-weight: 900;
  letter-spacing: -0.04em;
  color: var(--white);
  line-height: 1.1;
  margin-top: 2px;
}

/* Section chips */
.sec-label {
  font-size: 0.7em;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.sec-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.sec-chip {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 6px 13px;
  font-size: 0.82em;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.sec-chip.active {
  background: var(--lime);
  border-color: var(--lime);
  color: #000;
}

/* Count + shuffle */
.row-options {
  display: flex;
  gap: 10px;
}
.opt-group { flex: 1; }
.opt-group-label {
  font-size: 0.68em;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}
.pill-row { display: flex; gap: 5px; }
.pill-btn {
  flex: 1;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 8px 4px;
  font-size: 0.82em;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-appearance: none;
}
.pill-btn.active {
  background: var(--white);
  border-color: var(--white);
  color: #000;
  font-weight: 800;
}

/* Review mode */
.review-mode-card {
  background: var(--surface2);
  border: 1.5px solid var(--amber);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.rm-title { font-weight: 700; font-size: 0.88em; color: var(--amber); }
.rm-count { font-size: 0.75em; color: var(--muted); margin-top: 2px; }
.review-mode-btn {
  background: var(--amber);
  color: #000;
  border: none;
  border-radius: var(--r-sm);
  padding: 8px 14px;
  font-size: 0.85em;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
}

/* Start button */
.start-btn {
  background: var(--lime);
  color: #000;
  border: none;
  border-radius: var(--r-lg);
  padding: 18px;
  font-size: 1.05em;
  font-weight: 900;
  cursor: pointer;
  width: 100%;
  letter-spacing: 0.01em;
  transition: all 0.15s;
  -webkit-appearance: none;
  margin-top: 4px;
}
.start-btn:active { transform: scale(0.98); background: var(--lime-dim); }

/* =============================================
   QUIZ SCREEN
============================================= */
#quizScreen {
  display: flex;
  flex-direction: column;
  min-height: calc(100svh - 130px);
}

.progress-wrap {
  padding: 12px 18px 8px;
  border-bottom: 1px solid var(--border);
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.72em;
  color: var(--muted);
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}
.progress-bar {
  height: 3px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--lime);
  border-radius: 3px;
  transition: width 0.4s ease;
}

.section-tag {
  font-size: 0.68em;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--lime);
  padding: 10px 18px 4px;
  opacity: 0.75;
}

.question-card {
  flex: 1;
  padding: 10px 18px 12px;
}
.question-text {
  font-size: 1.12em;
  font-weight: 600;
  line-height: 1.65;
  color: var(--white);
  letter-spacing: -0.01em;
}
.question-text mark {
  background: transparent;
  color: var(--lime);
  font-weight: 700;
}

/* ○× — big tactile slabs */
.tf-buttons {
  display: flex;
  gap: 10px;
  padding: 16px 0 4px;
}
.tf-btn {
  flex: 1;
  border: 2px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--surface2);
  font-size: 3.2em;
  font-weight: 900;
  cursor: pointer;
  height: clamp(100px, 25vw, 130px);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: all 0.12s;
  -webkit-appearance: none;
}
.tf-btn.maru { border-color: #2A3A2A; }
.tf-btn.batu { border-color: #3A2A2A; }
.tf-btn:active { transform: scale(0.94); }
.tf-btn.selected-correct, .tf-btn.correct-ans {
  background: #0F2A1A;
  border-color: var(--correct);
  color: var(--correct);
}
.tf-btn.selected-wrong {
  background: #2A0F0F;
  border-color: var(--wrong);
  color: var(--wrong);
}
.tf-btn:disabled { cursor: default; }
.answer-revealed .tf-btn:not(.selected-correct):not(.selected-wrong):not(.correct-ans) {
  opacity: 0.25;
}

/* MC choices */
.mc-choices { display: flex; flex-direction: column; gap: 8px; padding: 14px 0 4px; }
.mc-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  text-align: left;
  font-size: 0.9em;
  font-weight: 500;
  color: var(--white);
  cursor: pointer;
  transition: all 0.12s;
  -webkit-appearance: none;
}
.mc-btn.selected-correct, .mc-btn.correct-ans {
  background: #0F2A1A; border-color: var(--correct); color: var(--correct);
}
.mc-btn.selected-wrong {
  background: #2A0F0F; border-color: var(--wrong); color: var(--wrong);
}
.mc-btn:disabled { cursor: default; }
.answer-revealed .mc-btn:not(.selected-correct):not(.selected-wrong):not(.correct-ans) { opacity: 0.35; }

/* Feedback */
.feedback-card {
  margin: 6px 18px;
  border-radius: var(--r-md);
  padding: 13px 15px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: 0.86em;
  line-height: 1.65;
  color: #A0A0B8;
}
.feedback-header {
  font-weight: 800;
  font-size: 0.9em;
  margin-bottom: 5px;
}
.feedback-header.correct { color: var(--correct); }
.feedback-header.wrong   { color: var(--wrong); }
.feedback-card mark { background: transparent; color: var(--lime); font-weight: 700; }

/* Action row */
.action-row {
  display: flex;
  gap: 8px;
  padding: 10px 18px 20px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
}
.action-btn {
  flex: 1;
  border: none;
  border-radius: var(--r-md);
  padding: 15px;
  font-size: 0.88em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-appearance: none;
}
.btn-skip {
  background: var(--surface2);
  color: var(--muted);
  border: 1.5px solid var(--border);
}
.btn-next {
  background: var(--lime);
  color: #000;
}
.btn-next:active { background: var(--lime-dim); }

/* =============================================
   RESULT SCREEN
============================================= */
#resultScreen {
  padding: 20px 18px 32px;
  max-width: 480px;
  margin: 0 auto;
}
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px 22px;
  text-align: center;
  margin-bottom: 12px;
}
.result-emoji { font-size: 2.8em; margin-bottom: 8px; }
.result-card h2 { font-size: 1em; font-weight: 700; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }
.score-big { font-size: 4em; font-weight: 900; color: var(--lime); letter-spacing: -0.04em; line-height: 1; }
.score-label { font-size: 0.75em; color: var(--muted); margin-bottom: 18px; margin-top: 2px; }
.score-grid { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
.score-item {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 12px 6px;
  text-align: center;
}
.score-item .val { font-size: 1.6em; font-weight: 900; }
.score-item .lbl { font-size: 0.68em; color: var(--muted); margin-top: 2px; }
.score-item.ok .val { color: var(--correct); }
.score-item.ng .val { color: var(--wrong); }
.score-item.sk .val { color: var(--amber); }
.result-btns { display: flex; flex-direction: column; gap: 8px; }
.retry-btn {
  width: 100%;
  border-radius: var(--r-md);
  padding: 14px;
  font-size: 0.9em;
  font-weight: 800;
  cursor: pointer;
  border: none;
  -webkit-appearance: none;
  transition: all 0.15s;
}
.retry-btn.primary { background: var(--lime); color: #000; }
.retry-btn.outline {
  background: transparent;
  color: var(--muted);
  border: 1.5px solid var(--border);
}
.retry-btn:active { transform: scale(0.98); }

/* Review */
#reviewSection { margin-top: 4px; }
.review-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.85em;
  color: var(--wrong);
  margin-bottom: 8px;
}
.review-list { display: none; flex-direction: column; gap: 8px; padding-bottom: 32px; }
.review-list.open { display: flex; }
.review-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 13px 15px;
  font-size: 0.84em;
}
.review-q { font-weight: 600; color: var(--white); margin-bottom: 6px; line-height: 1.55; }
.review-q mark { background: transparent; color: var(--lime); font-weight: 700; }
.review-ans { font-size: 0.82em; color: var(--correct); font-weight: 600; margin-bottom: 4px; }
.review-fb { font-size: 0.82em; color: var(--muted); line-height: 1.55; }
.review-fb mark { background: transparent; color: var(--lime); font-weight: 700; }


/* SRS badge in feedback */
.srs-badge {
  display: inline-block;
  margin-top: 10px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.78em;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.srs-badge.lv0 { background: #2A0F0F; color: var(--wrong);   border: 1px solid var(--wrong); }
.srs-badge.lv1 { background: #2A1A00; color: var(--amber);   border: 1px solid var(--amber); }
.srs-badge.lv2 { background: #1A2000; color: #A8D020;        border: 1px solid #A8D020; }
.srs-badge.lv3 { background: #0A1F0A; color: var(--correct); border: 1px solid var(--correct); }
.srs-badge.lv4 { background: #0A150F; color: #4AFF9A;        border: 1px solid #4AFF9A; }
.srs-badge.graduated { background: #0A100A; color: var(--lime); border: 1px solid var(--lime); font-size: 0.9em; }

/* =============================================
   RPG AVATAR SYSTEM
============================================= */
.avatar-section {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
}
.avatar-pixel {
  flex-shrink: 0;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
.avatar-info { flex: 1; min-width: 0; }
.avatar-name {
  font-size: 0.72em;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--lime);
  margin-bottom: 2px;
}
.avatar-title {
  font-size: 1em;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -0.02em;
}
.xp-bar-wrap {
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.xp-bar-bg {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.xp-bar-fill {
  height: 100%;
  background: var(--lime);
  border-radius: 3px;
  transition: width 0.6s ease;
}
.xp-label {
  font-size: 0.68em;
  color: var(--muted);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.xp-gained {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--lime);
  color: #000;
  font-weight: 900;
  font-size: 1.4em;
  padding: 10px 24px;
  border-radius: 30px;
  z-index: 999;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s, transform 0.4s;
  letter-spacing: -0.02em;
}
.xp-gained.show {
  opacity: 1;
  transform: translate(-50%, -70%);
}
.levelup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  gap: 12px;
}
.levelup-overlay.hidden { display: none; }
.levelup-text {
  font-size: 2em;
  font-weight: 900;
  color: var(--lime);
  letter-spacing: -0.03em;
  text-align: center;
}
.levelup-sub {
  font-size: 1em;
  color: var(--muted);
  text-align: center;
}
.levelup-btn {
  margin-top: 16px;
  background: var(--lime);
  color: #000;
  border: none;
  border-radius: 14px;
  padding: 14px 32px;
  font-size: 1em;
  font-weight: 900;
  cursor: pointer;
}
/* UTILS */
.hidden { display: none !important; }
ruby rt { font-size: 0.55em; }
</style>
</head>
<body>

<!-- AUTH BAR -->
<div id="authBar" class="hidden">
  <div class="auth-user">
    <img id="authAvatar" class="auth-avatar" src="" style="display:none">
    <span id="authName">ログインしていません</span>
  </div>
  <button class="auth-btn" id="authActionBtn" onclick="toggleAuth()">Googleでログイン</button>
</div>

<!-- HEADER -->
<header class="app-header">
  <span class="app-title" onclick="goHome()">📊 外務員一種<span>&nbsp;Quiz</span></span>
  <div class="header-stats" id="headerStats"></div>
</header>

<!-- LANG BAR -->
<div class="lang-bar" id="langBar">
  <button class="lang-btn active" onclick="setLang('ja')">📖 日本語</button>
  <button class="lang-btn" onclick="setLang('furigana')">あ ふりがな</button>
  <button class="lang-btn" onclick="setLang('en')">🌐 English</button>
</div>

<!-- LEVEL UP OVERLAY -->
<div class="levelup-overlay hidden" id="levelupOverlay">
  <svg id="levelupAvatar" width="96" height="108" viewBox="0 0 80 112" style="image-rendering:pixelated"></svg>
  <div class="levelup-text" id="levelupText">LEVEL UP!</div>
  <div class="levelup-sub" id="levelupSub"></div>
  <button class="levelup-btn" onclick="closeLevelUp()">続ける →</button>
</div>

<!-- XP TOAST -->
<div class="xp-gained" id="xpToast"></div>

<!-- START SCREEN -->
<div id="startScreen">
  <!-- AVATAR CARD -->
  <div class="avatar-section" id="avatarSection" style="display:none">
    <svg class="avatar-pixel" id="avatarSvg" width="64" height="72" viewBox="0 0 80 112"></svg>
    <div class="avatar-info">
      <div class="avatar-name" id="avatarLvLabel">Lv 1</div>
      <div class="avatar-title" id="avatarTitle">見習い</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div></div>
        <div class="xp-label" id="xpLabel">0 XP</div>
      </div>
    </div>
  </div>

  <div>
    <div class="start-eyebrow">証券外務員一種</div>
    <div class="start-title">○×<br>クイズ</div>
  </div>

  <div>
    <div class="sec-label">セクション</div>
    <div class="sec-chips" id="secChecks"></div>
  </div>

  <div class="row-options">
    <div class="opt-group">
      <div class="opt-group-label">問題数</div>
      <div class="pill-row" id="countOpts">
        <button class="pill-btn active" data-val="10" onclick="selectCount(this)">10</button>
        <button class="pill-btn" data-val="20" onclick="selectCount(this)">20</button>
        <button class="pill-btn" data-val="999" onclick="selectCount(this)">全問</button>
      </div>
    </div>
    <div class="opt-group">
      <div class="opt-group-label">シャッフル</div>
      <div class="pill-row" id="shuffleOpts">
        <button class="pill-btn active" data-val="1" onclick="selectShuffle(this)">あり</button>
        <button class="pill-btn" data-val="0" onclick="selectShuffle(this)">なし</button>
      </div>
    </div>
  </div>

  <div class="review-mode-card" id="reviewModeCard">

function applyFurigana(text) {
  let t = text;
  // Sort by length descending to avoid partial matches
  const keys = Object.keys(FURIGANA).sort((a,b) => b.length - a.length);
  keys.forEach(k => {
    const re = new RegExp(k, 'g');
    t = t.replace(re, `<ruby>${k}<rt>${FURIGANA[k]}</rt></ruby>`);
  });
  return t;
}

// APP STATE
// =============================================
let lang = 'ja';
let selectedSecs = ["金商法","オプション","信用取引","先物取引","会社法","財務諸表と企業分析"];
let selectedCount = 10;
let doShuffle = true;

let queue = [];
let skipped = [];
let wrongData = [];
let currentIdx = 0;
let current = null;
let answered = false;
let correctCount = 0;
let wrongCount = 0;
let isSkipRound = false;

// =============================================
// INIT
// =============================================
window.onload = () => {
  buildSecChecks();
};

function buildSecChecks() {
  const secs = ["金商法","オプション","信用取引","先物取引","会社法","財務諸表と企業分析"];
  const c = document.getElementById('secChecks');
  c.innerHTML = '';
  secs.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sec-chip active';
    btn.textContent = s;
    btn.onclick = () => toggleSec(btn, s);
    c.appendChild(btn);
  });
}

function toggleSec(btn, sec) {
  const active = selectedSecs.includes(sec);
  if (active && selectedSecs.length === 1) return; // keep at least 1
  if (active) {
    selectedSecs = selectedSecs.filter(s => s !== sec);
    btn.classList.remove('active');
  } else {
    selectedSecs.push(sec);
    btn.classList.add('active');
  }
}

function selectCount(btn) {
  document.querySelectorAll('#countOpts .pill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedCount = parseInt(btn.dataset.val);
}

function selectShuffle(btn) {
  document.querySelectorAll('#shuffleOpts .pill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  doShuffle = btn.dataset.val === '1';
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (current && answered) renderQuestion();
  else if (current) renderQuestion();
}

// =============================================
// START
// =============================================
function startQuiz(qs) {
  let pool = qs || QS.filter(q => selectedSecs.includes(q.sec));
  if (doShuffle) pool = shuffle([...pool]);
  queue = pool.slice(0, Math.min(selectedCount, pool.length));
  skipped = [];
  wrongData = [];
  correctCount = 0;
  wrongCount = 0;
  currentIdx = 0;
  answered = false;
  isSkipRound = false;

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');

  loadQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// =============================================
// QUESTION RENDER
// =============================================
function loadQuestion() {
  if (currentIdx >= queue.length) {
    if (skipped.length > 0 && !isSkipRound) {
      isSkipRound = true;
      queue = [...skipped];
      skipped = [];
      currentIdx = 0;
      updateHeader();
    } else {
      showResult();
      return;
    }
  }
  current = queue[currentIdx];
  answered = false;
  renderQuestion();
  updateHeader();
  updateProgress();
}

function renderQuestion() {
  const total = queue.length + skipped.length;
  const done = currentIdx;

  // Section tag
  document.getElementById('secTag').textContent = current.sec;

  // Question text
  let qt = current.q;
  if (lang === 'furigana') qt = applyFurigana(qt);
  else if (lang === 'en' && current.q_en) qt = current.q_en;
  document.getElementById('questionText').innerHTML = qt;

  // Buttons
  const tfDiv = document.getElementById('tfButtons');
  const mcDiv = document.getElementById('mcChoices');
  if (current.type === 'tf') {
    tfDiv.classList.remove('hidden');
    mcDiv.classList.add('hidden');
    tfDiv.querySelectorAll('.tf-btn').forEach(b => {
      b.className = b.classList.contains('maru') ? 'tf-btn maru' : 'tf-btn batu';
    });
    document.getElementById('questionCard').classList.remove('answer-revealed');
  } else {
    tfDiv.classList.add('hidden');
    mcDiv.classList.remove('hidden');
    mcDiv.innerHTML = '';
    current.choices.forEach((ch, i) => {
      const btn = document.createElement('button');
      btn.className = 'mc-btn';
      btn.innerHTML = `${i+1}. ${ch}`;
      btn.onclick = () => answerMC(i);
      mcDiv.appendChild(btn);
    });
    document.getElementById('questionCard').classList.remove('answer-revealed');
  }

  // Feedback
  const fb = document.getElementById('feedbackCard');
  fb.classList.remove('show','correct','wrong');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('skipBtn').classList.remove('hidden');
}

function updateProgress() {
  const total = queue.length;
  const pct = total > 0 ? Math.round((currentIdx / total) * 100) : 0;
  document.getElementById('progLabel').textContent = `${currentIdx + 1} / ${total}${isSkipRound ? ' (スキップ再出題)' : ''}`;
  document.getElementById('progPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
}

function updateHeader() {
  const stats = document.getElementById('headerStats');
  const skipCount = skipped.length;
  stats.innerHTML = `
    <span class="stat-badge">✅ ${correctCount}</span>
    <span class="stat-badge">❌ ${wrongCount}</span>
    ${skipCount > 0 ? `<span class="stat-badge skip">⏭ スキップ: ${skipCount}問</span>` : ''}
  `;
}

// =============================================
// ANSWER
// =============================================
function answerTF(userAns) {
  if (answered) return;
  answered = true;
  const correct = current.tf === userAns;
  showFeedback(correct);

  // style buttons
  const card = document.getElementById('questionCard');
  card.classList.add('answer-revealed');
  const btns = document.querySelectorAll('.tf-btn');
  btns.forEach(b => {
    const isMaru = b.classList.contains('maru');
    const btnVal = isMaru; // true=maru, false=batu
    if (btnVal === userAns) {
      b.classList.add(correct ? 'selected-correct' : 'selected-wrong');
    }
    if (btnVal === current.tf) {
      b.classList.add('correct-ans');
    }
  });

  if (correct) { correctCount++; recordAnswer(current, true); }
  else {
    wrongCount++;
    wrongData.push({q: current, userAns: userAns ? '○' : '×'});
    recordAnswer(current, false);
  }
  updateHeader();
}

function answerMC(idx) {
  if (answered) return;
  answered = true;
  const correct = idx === current.correct;
  showFeedback(correct);

  const card = document.getElementById('questionCard');
  card.classList.add('answer-revealed');
  const btns = document.querySelectorAll('.mc-btn');
  btns.forEach((b, i) => {
    if (i === idx) b.classList.add(correct ? 'selected-correct' : 'selected-wrong');
    if (i === current.correct) b.classList.add('correct-ans');
  });

  if (correct) { correctCount++; recordAnswer(current, true); }
  else {
    wrongCount++;
    wrongData.push({q: current, userAns: current.choices[idx]});
    recordAnswer(current, false);
  }
  updateHeader();
}

function showFeedback(correct) {
  const fb = document.getElementById('feedbackCard');
  const header = document.getElementById('feedbackHeader');
  const text = document.getElementById('feedbackText');

  fb.classList.remove('hidden');
  header.className = 'feedback-header ' + (correct ? 'correct' : 'wrong');
  header.textContent = correct ? '✅ 正解！' : '❌ 不正解';

  let fbText = current.fb;
  if (lang === 'en' && current.fb_en) fbText = current.fb_en;
  else if (lang === 'furigana') fbText = applyFurigana(current.fb);

  // SRS badge — show next review timing
  const key = `q${current.n}_${current.sec}`;
  const entry = mistakeBank[key];
  let srsBadge = '';
  if (currentUser && entry) {
    const lvl = entry.level;
    if (lvl >= 5) {
      srsBadge = `<div class="srs-badge graduated">🎓 完全習得！</div>`;
    } else {
      const label = srIntervalLabel(lvl);
      const stars = '★'.repeat(lvl) + '☆'.repeat(4 - Math.min(lvl, 4));
      srsBadge = `<div class="srs-badge lv${lvl}">${stars} Lv${lvl} — 次回：${label}</div>`;
    }
  }

  text.innerHTML = fbText + srsBadge;

  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('skipBtn').classList.add('hidden');
}

// =============================================
// NAVIGATION
// =============================================
function nextQ() {
  currentIdx++;
  loadQuestion();
}

function skipQ() {
  if (answered) return;
  skipped.push(current);
  currentIdx++;
  updateHeader();
  loadQuestion();
}

// =============================================
// RESULT
// =============================================
function showResult() {
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');

  const total = correctCount + wrongCount;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scoreBig').textContent = pct + '%';
  document.getElementById('scoreOk').textContent = correctCount;
  document.getElementById('scoreNg').textContent = wrongCount;
  document.getElementById('scoreSk').textContent = skipped.length;

  const emoji = pct >= 80 ? '🎉' : pct >= 60 ? '😊' : '💪';
  document.getElementById('resultEmoji').textContent = emoji;

  renderReview();
  updateHeader();
}

function renderReview() {
  const list = document.getElementById('reviewList');
  if (wrongData.length === 0) {
    list.innerHTML = '<p style="padding:16px;color:#6b7280;">間違えた問題はありません 🎉</p>';
    return;
  }
  list.innerHTML = wrongData.map((d, i) => {
    const ans = d.q.type === 'tf' ? (d.q.tf ? '○' : '×') : d.q.choices[d.q.correct];
    return `
      <div class="review-item">
        <div class="review-q"><strong>${i+1}.</strong> [${d.q.sec}] ${d.q.q}</div>
        <div class="review-ans">✅ 正解：${ans}（あなたの回答：${d.userAns}）</div>
        <div class="review-fb">${d.q.fb}</div>
      </div>`;
  }).join('');
}

function toggleReview() {
  const list = document.getElementById('reviewList');
  const arrow = document.getElementById('reviewArrow');
  list.classList.toggle('open');
  arrow.textContent = list.classList.contains('open') ? '▲' : '▼';
}

function retryWrong() {
  if (wrongData.length === 0) { goStart(); return; }
  startQuiz(wrongData.map(d => d.q));
}

function goStart() {
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('headerStats').innerHTML = '';
}

function goHome() {
  // Hide all screens, show start screen — state is preserved
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

let currentUser = null;

// =============================================
// SPACED REPETITION ENGINE
// =============================================
// Level → next review interval (minutes)
const SR_INTERVALS = {
  0: 10,        // 10分後
  1: 60,        // 1時間後
  2: 360,       // 6時間後
  3: 1440,      // 1日後
  4: 4320,      // 3日後
  5: Infinity   // 🎓 卒業
};

// Level down table when wrong
const SR_DOWNGRADE = {
  0: 0,
  1: 0,
  2: 1,
  3: 1,
  4: 2,
  5: 3
};

function srNextReview(level) {
  const mins = SR_INTERVALS[level] ?? 10;
  if (mins === Infinity) return null; // graduated
  const d = new Date();
  d.setMinutes(d.getMinutes() + mins);
  return d.toISOString();
}

function srIntervalLabel(level) {
  const labels = ['10分後', '1時間後', '6時間後', '1日後', '3日後', '🎓 完全習得'];
  return labels[level] ?? '10分後';
}

function isDue(entry) {
  if (!entry.nextReview) return true;
  return new Date(entry.nextReview) <= new Date();
}

// ---------- Firestore ----------
async function loadMistakeBank() {
  if (!currentUser) return;
  const ref  = doc(db, 'users', currentUser.uid);
  const snap = await getDoc(ref);
  mistakeBank = snap.exists() ? (snap.data().mistakes || {}) : {};
  renderReviewModeCard();
}

async function saveMistakeBank() {
  if (!currentUser) return;
  const ref = doc(db, 'users', currentUser.uid);
  await setDoc(ref, { mistakes: mistakeBank, updatedAt: serverTimestamp() }, { merge: true });
}

// ---------- Record answer with SRS ----------
async function recordAnswer(qObj, isCorrect) {
  if (!currentUser) return;
  const key = `q${qObj.n}_${qObj.sec}`;
  const existing = mistakeBank[key] || {
    n: qObj.n, sec: qObj.sec, type: qObj.type || 'tf',
    q: qObj.q, tf: qObj.tf, fb: qObj.fb, fb_en: qObj.fb_en || '',
    level: 0, streak: 0, totalWrong: 0, nextReview: null
  };

  if (isCorrect) {
    const newLevel = Math.min(existing.level + 1, 5);
    const newStreak = existing.streak + 1;
    if (newLevel >= 5) {
      // Graduated — keep record but mark complete
      mistakeBank[key] = {
        ...existing,
        level: 5, streak: newStreak,
        nextReview: null, graduatedAt: new Date().toISOString()
      };
    } else {
      mistakeBank[key] = {
        ...existing,
        level: newLevel, streak: newStreak,
        nextReview: srNextReview(newLevel)
      };
    }
  } else {
    const newLevel = SR_DOWNGRADE[existing.level] ?? 0;
    mistakeBank[key] = {
      ...existing,
      level: newLevel, streak: 0,
      totalWrong: (existing.totalWrong || 0) + 1,
      nextReview: srNextReview(newLevel)
    };
  }

  await saveMistakeBank();
  renderReviewModeCard();
}

// ---------- Review Mode Card ----------
function renderReviewModeCard() {
  const card  = document.getElementById('reviewModeCard');
  const countEl = document.getElementById('reviewModeCount');
  if (!currentUser) { card.style.display = 'none'; return; }

  const allKeys  = Object.keys(mistakeBank);
  const dueKeys  = allKeys.filter(k => mistakeBank[k].level < 5 && isDue(mistakeBank[k]));
  const totalActive = allKeys.filter(k => mistakeBank[k].level < 5).length;
  const graduated = allKeys.filter(k => mistakeBank[k].level >= 5).length;

  if (totalActive === 0 && graduated === 0) {
    card.style.display = 'none';
    return;
  }

  card.style.display = 'flex';

  // Find next upcoming review time
  const upcoming = allKeys
    .filter(k => mistakeBank[k].level < 5 && !isDue(mistakeBank[k]))
    .map(k => new Date(mistakeBank[k].nextReview))
    .sort((a,b) => a-b);

  let subtitle = '';
  if (dueKeys.length > 0) {
    subtitle = `今すぐ復習：${dueKeys.length}問`;
  } else if (upcoming.length > 0) {
    const mins = Math.round((upcoming[0] - new Date()) / 60000);
    if (mins < 60) subtitle = `次の復習まで約${mins}分`;
    else subtitle = `次の復習まで約${Math.round(mins/60)}時間`;
  }
  if (graduated > 0) subtitle += `　🎓 完全習得：${graduated}問`;

  countEl.innerHTML = subtitle || `学習中：${totalActive}問`;

  // Due badge on button
  const dueBadge = document.getElementById('rmDueBadge');
  if (dueBadge) {
    if (dueKeys.length > 0) {
      dueBadge.style.display = 'inline';
      dueBadge.textContent = `今すぐ ${dueKeys.length}問`;
    } else {
      dueBadge.style.display = 'none';
    }
  }
}

function startReviewMode() {
  const dueKeys = Object.keys(mistakeBank).filter(k =>
    mistakeBank[k].level < 5 && isDue(mistakeBank[k])
  );
  if (dueKeys.length === 0) {
    alert('今すぐ復習する問題はありません！\n\n次の復習時間まで待ちましょう 📚');
    return;
  }
  const reviewQs = dueKeys.map(k => {
    const m = mistakeBank[k];
    return { n: m.n, sec: m.sec, type: m.type || 'tf', q: m.q, tf: m.tf, fb: m.fb, fb_en: m.fb_en || '' };
  });
  reviewQs.sort(() => Math.random() - 0.5);
  startQuiz(reviewQs);
}

const AVATAR_LEVELS = [
  { minLv:1,  maxLv:5,  title:"見習い",          xpNeeded:0,      color:"#C8F135" },
  { minLv:6,  maxLv:15, title:"剣士",             xpNeeded:500,    color:"#C8F135" },
  { minLv:16, maxLv:25, title:"騎士",             xpNeeded:3000,   color:"#C8F135" },
  { minLv:26, maxLv:35, title:"魔法剣士",          xpNeeded:10000,  color:"#A040FF" },
  { minLv:36, maxLv:39, title:"ニート勇者",         xpNeeded:30000,  color:"#C8F135" },
  { minLv:40, maxLv:44, title:"サラリーマン戦士",   xpNeeded:50000,  color:"#C8F135" },
  { minLv:45, maxLv:49, title:"おじいちゃん勇者",   xpNeeded:70000,  color:"#C8F135" },
  { minLv:50, maxLv:50, title:"外務員マスター",     xpNeeded:100000, color:"#FFD700" },
];

// XP needed for each level: base 100, grows as level^1.8
function xpForLevel(lv) {
  if (lv <= 1) return 0;
  return Math.floor(100 * Math.pow(lv - 1, 1.8));
}
function totalXpForLevel(lv) {
  let total = 0;
  for (let i = 2; i <= lv; i++) total += xpForLevel(i);
  return total;
}
function levelFromXp(xp) {
  let lv = 1;
  while (lv < 50 && totalXpForLevel(lv + 1) <= xp) lv++;
  return lv;
}
function getAvatarStage(lv) {
  return AVATAR_LEVELS.find(s => lv >= s.minLv && lv <= s.maxLv) || AVATAR_LEVELS[0];
}

// XP awards
const XP_CORRECT      = 10;
const XP_ANSWER       = 5;
const XP_REVIEW_BONUS = 5; // extra for review mode correct

let playerXp = 0;
let playerLv = 1;
let isReviewMode = false;

async function loadPlayerXp() {
  if (!currentUser) return;
  const ref  = doc(db, 'users', currentUser.uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    playerXp = snap.data().xp || 0;
  }
  playerLv = levelFromXp(playerXp);
  renderAvatar();
}

async function savePlayerXp() {
  if (!currentUser) return;
  const ref = doc(db, 'users', currentUser.uid);
  await setDoc(ref, { xp: playerXp }, { merge: true });
}

function awardXp(amount, label) {
  const oldLv = playerLv;
  playerXp += amount;
  playerLv = levelFromXp(playerXp);
  savePlayerXp();
  showXpToast('+' + amount + ' XP  ' + label);
  if (playerLv > oldLv) {
    setTimeout(() => showLevelUp(oldLv, playerLv), 800);
  }
  renderAvatar();
}

function showXpToast(msg) {
  const el = document.getElementById('xpToast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1400);
}

function showLevelUp(oldLv, newLv) {
  const stage = getAvatarStage(newLv);
  const overlay = document.getElementById('levelupOverlay');
  document.getElementById('levelupText').textContent = '⬆ LEVEL ' + newLv + ' !';
  document.getElementById('levelupSub').textContent = stage.title + ' になった！';
  // Show avatar SVG in overlay
  document.getElementById('levelupAvatar').innerHTML = buildAvatarSvgContent(newLv, 80);
  overlay.classList.remove('hidden');
}

function closeLevelUp() {
  document.getElementById('levelupOverlay').classList.add('hidden');
}

function renderAvatar() {
  const section = document.getElementById('avatarSection');
  if (!currentUser) { section.style.display = 'none'; return; }
  section.style.display = 'flex';

  const lv = playerLv;
  const stage = getAvatarStage(lv);
  const curLvXp  = totalXpForLevel(lv);
  const nextLvXp = lv < 50 ? totalXpForLevel(lv + 1) : totalXpForLevel(50);
  const pct = lv >= 50 ? 100 : Math.min(100, Math.round((playerXp - curLvXp) / (nextLvXp - curLvXp) * 100));

  document.getElementById('avatarLvLabel').textContent = 'Lv ' + lv;
  document.getElementById('avatarTitle').textContent = stage.title;
  document.getElementById('avatarTitle').style.color = stage.color;
  document.getElementById('xpBarFill').style.width = pct + '%';
  document.getElementById('xpBarFill').style.background = stage.color;
  document.getElementById('xpLabel').textContent = playerXp.toLocaleString() + ' XP';

  // Draw pixel avatar
  const svgEl = document.getElementById('avatarSvg');
  svgEl.innerHTML = buildAvatarSvgContent(lv, 64);
}

function buildAvatarSvgContent(lv, size) {
  const stage = getAvatarStage(lv);
  // Pick which avatar to draw
  if (lv <= 5)  return drawMinarai(size);
  if (lv <= 15) return drawKenshi(size);
  if (lv <= 25) return drawKishi(size);
  if (lv <= 35) return drawMahouKenshi(size);
  if (lv <= 39) return drawNeet(size);
  if (lv <= 44) return drawSalaryman(size);
  if (lv <= 49) return drawOjiichan(size);
  return drawMaster(size);
}

// scale: all designed at 64x112, scaled via transform

  const scale = s / 64;
  return rects.map(([x,y,w,h,fill,op]) =>
    `<rect x="${(x*scale).toFixed(1)}" y="${(y*scale).toFixed(1)}" w="${(w*scale).toFixed(1)}" h="${(h*scale).toFixed(1)}" width="${(w*scale).toFixed(1)}" height="${(h*scale).toFixed(1)}" fill="${fill}"${op?' opacity="'+op+'"':''}/>`)
    .join('');
}

  await _origRecordAnswer(qObj, isCorrect);
  // Award XP
  const bonus = isReviewMode && isCorrect ? XP_REVIEW_BONUS : 0;
  if (isCorrect) {
    awardXp(XP_CORRECT + XP_ANSWER + bonus, isReviewMode ? '復習ボーナス！' : '正解！');
  } else {
    awardXp(XP_ANSWER, '挑戦');
  }
}

// Override startReviewMode to set flag
const _origStartReviewMode = startReviewMode;
function startReviewMode() {
  isReviewMode = true;
  _origStartReviewMode();
}
const _origStartQuiz = startQuiz;
function startQuiz(qs) {
  if (!qs) isReviewMode = false; // normal quiz resets flag
  _origStartQuiz(qs);
}

// Load XP when user logs in
const _origLoadMistakeBank = loadMistakeBank;
async function loadMistakeBank() {
  await _origLoadMistakeBank();
  await loadPlayerXp();
}

// Expose new functions
window.closeLevelUp = closeLevelUp;
window.startReviewMode = startReviewMode;
window.startQuiz = startQuiz;

</script>
</body>
